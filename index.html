  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n  :root {\n    /* TWEAK DEFAULTS — these get merged by the host on change */\n    --theme: warm;\n  }\n\n  /* ── THEME TOKENS ── */\n  body[data-theme=\"warm\"] {\n    --bg: oklch(0.97 0.012 65);\n    --bg2: oklch(0.93 0.018 65);\n    --bg3: oklch(0.22 0.04 30);\n    --fg: oklch(0.15 0.025 35);\n    --fg-mid: oklch(0.4 0.02 35);\n    --fg-light: oklch(0.58 0.015 40);\n    --red: oklch(0.48 0.195 26);\n    --red-light: oklch(0.92 0.04 26);\n    --gold: oklch(0.72 0.13 72);\n    --gold-light: oklch(0.94 0.04 72);\n    --card: oklch(1 0 0 / 0.7);\n    --card-border: oklch(0.85 0.02 65);\n    --serif: 'DM Serif Display', Georgia, serif;\n    --sans: 'DM Sans', system-ui, sans-serif;\n  }\n  body[data-theme=\"slate\"] {\n    --bg: oklch(0.12 0.02 250);\n    --bg2: oklch(0.17 0.025 250);\n    --bg3: oklch(0.08 0.015 250);\n    --fg: oklch(0.94 0.008 250);\n    --fg-mid: oklch(0.72 0.01 250);\n    --fg-light: oklch(0.55 0.01 250);\n    --red: oklch(0.65 0.18 26);\n    --red-light: oklch(0.2 0.04 26);\n    --gold: oklch(0.78 0.14 72);\n    --gold-light: oklch(0.2 0.04 72);\n    --card: oklch(0.18 0.025 250 / 0.9);\n    --card-border: oklch(0.28 0.02 250);\n    --serif: 'DM Serif Display', Georgia, serif;\n    --sans: 'DM Sans', system-ui, sans-serif;\n  }\n  body[data-theme=\"minimal\"] {\n    --bg: oklch(0.99 0.003 80);\n    --bg2: oklch(0.95 0.006 80);\n    --bg3: oklch(0.18 0.005 80);\n    --fg: oklch(0.12 0.005 80);\n    --fg-mid: oklch(0.38 0.005 80);\n    --fg-light: oklch(0.58 0.005 80);\n    --red: oklch(0.52 0.17 15);\n    --red-light: oklch(0.94 0.025 15);\n    --gold: oklch(0.68 0.1 50);\n    --gold-light: oklch(0.95 0.02 50);\n    --card: oklch(1 0 0);\n    --card-border: oklch(0.88 0.005 80);\n    --serif: 'DM Serif Display', Georgia, serif;\n    --sans: 'DM Sans', system-ui, sans-serif;\n  }\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n\n  body {\n    font-family: var(--sans);\n    background: var(--bg);\n    color: var(--fg);\n    transition: background 0.4s, color 0.4s;\n    overflow-x: hidden;\n  }\n\n  /* ── NAV ── */\n  nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    padding: 18px 48px;\n    display: flex; align-items: center; justify-content: space-between;\n    backdrop-filter: blur(16px) saturate(1.5);\n    background: oklch(from var(--bg) l c h / 0.88);\n    border-bottom: 1px solid var(--card-border);\n    transition: all 0.4s;\n  }\n  .nav-logo {\n    display: flex; align-items: center; gap: 10px;\n    font-family: var(--serif); font-size: 16px; color: var(--fg); text-decoration: none;\n  }\n  .nav-logo-mark {\n    width: 32px; height: 32px;\n    background: var(--red);\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .nav-logo-mark svg { width: 18px; height: 18px; }\n  .nav-links { display: flex; gap: 32px; align-items: center; }\n  .nav-links a {\n    font-size: 13px; font-weight: 500; color: var(--fg-mid);\n    text-decoration: none; letter-spacing: 0.02em;\n    transition: color 0.2s;\n  }\n  .nav-links a:hover { color: var(--red); }\n  .nav-cta {\n    background: var(--red); color: white !important;\n    padding: 8px 20px; border-radius: 6px; font-size: 13px !important;\n    transition: opacity 0.2s !important;\n  }\n  .nav-cta:hover { opacity: 0.85; color: white !important; }\n\n  /* ── SECTIONS ── */\n  section { min-height: 100vh; }\n\n  /* ── HERO ── */\n  .hero {\n    display: grid; grid-template-columns: 1fr 1fr;\n    min-height: 100vh; padding-top: 80px;\n    position: relative; overflow: hidden;\n  }\n  .hero-left {\n    display: flex; flex-direction: column; justify-content: center;\n    padding: 80px 64px 80px 80px;\n    position: relative; z-index: 2;\n  }\n  .hero-eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--red);\n    margin-bottom: 28px;\n  }\n  .hero-eyebrow::before {\n    content: ''; width: 24px; height: 2px; background: var(--red); display: inline-block;\n  }\n  .hero h1 {\n    font-family: var(--serif); font-size: clamp(42px, 4.5vw, 64px);\n    line-height: 1.08; color: var(--fg);\n    margin-bottom: 28px; letter-spacing: -0.01em;\n  }\n  .hero h1 em { color: var(--red); font-style: italic; }\n  .hero-sub {\n    font-size: 17px; line-height: 1.7; color: var(--fg-mid);\n    max-width: 440px; margin-bottom: 44px;\n    font-weight: 300;\n  }\n  .hero-actions { display: flex; gap: 14px; align-items: center; }\n  .btn-primary {\n    background: var(--red); color: white;\n    padding: 14px 28px; border-radius: 8px;\n    font-size: 14px; font-weight: 600; text-decoration: none;\n    transition: transform 0.2s, box-shadow 0.2s;\n    box-shadow: 0 4px 16px oklch(from var(--red) l c h / 0.3);\n  }\n  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px oklch(from var(--red) l c h / 0.4); }\n  .btn-secondary {\n    color: var(--fg-mid); font-size: 14px; font-weight: 500;\n    text-decoration: none; display: flex; align-items: center; gap: 6px;\n    transition: color 0.2s;\n  }\n  .btn-secondary:hover { color: var(--red); }\n  .hero-stats {\n    display: flex; gap: 40px; margin-top: 56px;\n    padding-top: 40px; border-top: 1px solid var(--card-border);\n  }\n  .hero-stat-n {\n    font-family: var(--serif); font-size: 36px; color: var(--fg);\n    line-height: 1;\n  }\n  .hero-stat-n span { color: var(--red); }\n  .hero-stat-l { font-size: 12px; color: var(--fg-light); margin-top: 4px; letter-spacing: 0.04em; }\n\n  .hero-right {\n    position: relative; display: flex; align-items: center; justify-content: center;\n    padding: 80px 80px 80px 40px;\n  }\n  .hero-bg-orb {\n    position: absolute; top: -100px; right: -200px;\n    width: 700px; height: 700px; border-radius: 50%;\n    background: radial-gradient(circle, oklch(from var(--red) l c h / 0.08), transparent 70%);\n    pointer-events: none;\n  }\n\n  /* ── STORY CARD ── */\n  .story-card {\n    background: var(--card);\n    border: 1px solid var(--card-border);\n    border-radius: 20px;\n    padding: 36px;\n    max-width: 400px;\n    box-shadow: 0 20px 60px oklch(0 0 0 / 0.08);\n    backdrop-filter: blur(8px);\n    position: relative; z-index: 2;\n  }\n  .story-card-header {\n    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;\n  }\n  .story-avatar {\n    width: 48px; height: 48px; border-radius: 50%;\n    background: var(--red-light);\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--serif); font-size: 20px; color: var(--red);\n    flex-shrink: 0;\n  }\n  .story-avatar-info { flex: 1; }\n  .story-avatar-name { font-weight: 600; font-size: 14px; color: var(--fg); }\n  .story-avatar-role { font-size: 12px; color: var(--fg-light); margin-top: 2px; }\n  .story-tag {\n    background: var(--gold-light); color: var(--gold);\n    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;\n    text-transform: uppercase; padding: 4px 10px; border-radius: 20px;\n  }\n  .story-text {\n    font-size: 14px; line-height: 1.75; color: var(--fg-mid);\n    font-style: italic; border-left: 3px solid var(--red);\n    padding-left: 16px; margin-bottom: 20px;\n  }\n  .story-text strong { font-style: normal; color: var(--fg); font-weight: 500; }\n  .story-location {\n    display: flex; align-items: center; gap: 6px;\n    font-size: 12px; color: var(--fg-light);\n  }\n\n  /* ── SECTION LABELS ── */\n  .section-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--red);\n    display: flex; align-items: center; gap: 8px;\n    margin-bottom: 20px;\n  }\n  .section-label::before { content: ''; width: 20px; height: 2px; background: var(--red); }\n\n  /* ── PROBLEM SECTION ── */\n  .problem-section {\n    background: var(--bg3);\n    color: var(--fg);\n    padding: 120px 80px;\n    position: relative; overflow: hidden;\n  }\n  body[data-theme=\"warm\"] .problem-section { color: oklch(0.95 0.01 65); }\n  body[data-theme=\"warm\"] .problem-section .section-label { color: var(--gold); }\n  body[data-theme=\"warm\"] .problem-section .section-label::before { background: var(--gold); }\n\n  .problem-inner { max-width: 1200px; margin: 0 auto; }\n  .problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }\n  .problem-h2 {\n    font-family: var(--serif); font-size: clamp(36px, 3.5vw, 52px);\n    line-height: 1.12; margin-bottom: 28px;\n  }\n  body[data-theme=\"warm\"] .problem-h2 { color: oklch(0.95 0.01 65); }\n  body[data-theme=\"slate\"] .problem-h2 { color: var(--fg); }\n  body[data-theme=\"minimal\"] .problem-h2 { color: var(--fg); }\n  .problem-h2 em { color: var(--gold); font-style: italic; }\n  .problem-body { font-size: 16px; line-height: 1.8; opacity: 0.75; font-weight: 300; }\n\n  .problem-gaps { display: flex; flex-direction: column; gap: 16px; }\n  .problem-gap {\n    background: oklch(1 0 0 / 0.06);\n    border: 1px solid oklch(1 0 0 / 0.1);\n    border-radius: 12px; padding: 20px 24px;\n    display: flex; align-items: flex-start; gap: 16px;\n  }\n  .problem-gap-icon {\n    width: 36px; height: 36px; border-radius: 8px;\n    background: oklch(1 0 0 / 0.08);\n    display: flex; align-items: center; justify-content: center;\n    flex-shrink: 0; font-size: 16px;\n  }\n  .problem-gap-title { font-weight: 600; font-size: 14px; opacity: 0.9; margin-bottom: 4px; }\n  .problem-gap-text { font-size: 13px; opacity: 0.6; line-height: 1.6; }\n\n  /* ── SOLUTION SECTION ── */\n  .solution-section { padding: 120px 80px; }\n  .solution-inner { max-width: 1200px; margin: 0 auto; }\n  .solution-h2 {\n    font-family: var(--serif); font-size: clamp(36px, 3.5vw, 52px);\n    line-height: 1.12; text-align: center; margin-bottom: 16px;\n  }\n  .solution-h2 em { color: var(--red); font-style: italic; }\n  .solution-sub {\n    font-size: 17px; line-height: 1.7; color: var(--fg-mid);\n    text-align: center; max-width: 580px; margin: 0 auto 72px;\n    font-weight: 300;\n  }\n  .solution-flow {\n    display: grid; grid-template-columns: 1fr 48px 1fr 48px 1fr;\n    align-items: center; gap: 0; margin-bottom: 72px;\n  }\n  .flow-node {\n    background: var(--card);\n    border: 1px solid var(--card-border);\n    border-radius: 16px; padding: 28px 24px;\n    text-align: center;\n    box-shadow: 0 4px 20px oklch(0 0 0 / 0.05);\n    transition: transform 0.2s, box-shadow 0.2s;\n  }\n  .flow-node:hover { transform: translateY(-2px); box-shadow: 0 8px 32px oklch(0 0 0 / 0.1); }\n  .flow-node.center { \n    background: var(--red); color: white;\n    border-color: var(--red);\n    box-shadow: 0 8px 32px oklch(from var(--red) l c h / 0.3);\n    transform: scale(1.05);\n  }\n  .flow-node.center:hover { transform: scale(1.05) translateY(-2px); }\n  .flow-icon { font-size: 28px; margin-bottom: 12px; display: block; }\n  .flow-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }\n  .flow-node.center .flow-title { color: white; }\n  .flow-desc { font-size: 12px; color: var(--fg-light); line-height: 1.6; }\n  .flow-node.center .flow-desc { color: rgba(255,255,255,0.75); }\n  .flow-arrow { text-align: center; color: var(--fg-light); font-size: 20px; }\n\n  /* ── DEMO SECTION ── */\n  .demo-section {\n    background: var(--bg2); padding: 120px 80px;\n  }\n  .demo-inner { max-width: 1200px; margin: 0 auto; }\n  .demo-h2 {\n    font-family: var(--serif); font-size: clamp(32px, 3vw, 48px);\n    line-height: 1.12; text-align: center; margin-bottom: 12px;\n  }\n  .demo-sub {\n    font-size: 16px; color: var(--fg-mid); text-align: center;\n    margin-bottom: 48px; font-weight: 300;\n  }\n\n  .demo-toggle {\n    display: flex; gap: 0; background: var(--card);\n    border: 1px solid var(--card-border); border-radius: 10px;\n    padding: 4px; width: fit-content; margin: 0 auto 48px;\n  }\n  .demo-tab {\n    padding: 10px 24px; border-radius: 7px; font-s (36px, 4vw, 56px); line-height: 1.08; margin-bottom: 20px; }\n  .cta-h2 em { color: var(--red); font-style: italic; }\n  .cta-body { font-size: 17px; color: var(--fg-mid); line-height: 1.7; margin-bottom: 44px; font-weight: 300; }\n  .cta-actions { display: flex; gap: 16px; justify-content: center; align-items: center; }\n  .btn-large {\n    background: var(--red); color: white;\n    padding: 18px 40px; border-radius: 10px;\n    font-size: 15px; font-weight: 600; text-decoration: none;\n    transition: transform 0.2s, box-shadow 0.2s;\n    box-shadow: 0 6px 24px oklch(from var(--red) l c h / 0.35);\n  }\n  .btn-large:hover { transform: translateY(-2px); box-shadow: 0 10px 36px oklch(from var(--red) l c h / 0.45); }\n  .btn-outline {\n    color: var(--fg-mid); font-size: 15px; font-weight: 500; text-decoration: none;\n    padding: 18px 32px; border-radius: 10px;\n    border: 1px solid var(--card-border);\n    transition: all 0.2s;\n  }\n  .btn-outline:hover { border-color: var(--red); color: var(--red); }\n\n  /* ── FOOTER ── */\n  footer {\n    border-top: 1px solid var(--card-border); padding: 40px 80px;\n    display: flex; align-items: center; justify-content: space-between;\n  }\n  .footer-left { font-size: 13px; color: var(--fg-light); }\n  .footer-right { font-size: 12px; color: var(--fg-light); display: flex; gap: 24px; }\n\n  /* ── TWEAKS PANEL ── */\n  #tweaks-panel {\n    display: none;\n    position: fixed; bottom: 24px; right: 24px; z-index: 9999;\n    background: var(--card); border: 1px solid var(--card-border);\n    border-radius: 16px; padding: 24px;\n    box-shadow: 0 12px 48px oklch(0 0 0 / 0.15);\n    min-width: 240px; backdrop-filter: blur(16px);\n  }\n  #tweaks-panel.visible { display: block; }\n  .tweaks-title { font-weight: 600; font-size: 14px; margin-bottom: 20px; color: var(--fg); }\n  .tweak-group { margin-bottom: 18px; }\n  .tweak-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-light); margin-bottom: 8px; }\n  .tweak-options { display: flex; gap: 8px; flex-wrap: wrap; }\n  .tweak-btn {\n    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;\n    cursor: pointer; background: var(--bg2); border: 1px solid var(--card-border);\n    color: var(--fg-mid); transition: all 0.2s; font-family: var(--sans);\n  }\n  .tweak-btn:hover { border-color: var(--red); color: var(--red); }\n  .tweak-btn.active { background: var(--red); color: white; border-color: var(--red); }\n\n  /* ── ANIMATIONS ── */\n  .fade-in {\n    opacity: 0; transform: translateY(24px);\n    transition: opacity 0.7s ease, transform 0.7s ease;\n  }\n  .fade-in.visible { opacity: 1; transform: translateY(0); }\n\n  /* ── SCROLLBAR ── */\n  ::-webkit-scrollbar { width: 6px; }\n  ::-webkit-scrollbar-track { background: var(--bg); }\n  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }\n\n  /* ── TYPING CURSOR ── */\n  .typing-cursor::after {\n    content: '|'; animation: blink 1s step-end infinite; color: var(--red);\n  }\n  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }\n\n  .source-badge {\n    display: inline-flex; align-items: center; gap: 5px;\n    background: var(--gold-light); color: oklch(0.5 0.12 72);\n    border-radius: 6px; padding: 6px 10px; font-size: 11px;\n    font-weight: 500; line-height: 1.4; margin-top: 6px;\n    border: 1px solid oklch(from var(--gold) l c h / 0.2);\n  }\n  .source-badge svg { flex-shrink: 0; }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-theme=\"warm\">\n\n<!-- NAV -->\n<nav>\n  <a href=\"#\" class=\"nav-logo\">\n    <div class=\"nav-logo-mark\">\n      <svg viewBox=\"0 0 18 18\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n        <circle cx=\"9\" cy=\"9\" r=\"4\" fill=\"white\" opacity=\"0.9\"><\u002Fcircle>\n        <circle cx=\"9\" cy=\"3\" r=\"1.5\" fill=\"white\" opacity=\"0.5\"><\u002Fcircle>\n        <circle cx=\"9\" cy=\"15\" r=\"1.5\" fill=\"white\" opacity=\"0.5\"><\u002Fcircle>\n        <circle cx=\"3\" cy=\"9\" r=\"1.5\" fill=\"white\" opacity=\"0.5\"><\u002Fcircle>\n        <circle cx=\"15\" cy=\"9\" r=\"1.5\" fill=\"white\" opacity=\"0.5\"><\u002Fcircle>\n        <line x1=\"9\" y1=\"5\" x2=\"9\" y2=\"7\" stroke=\"white\" stroke-width=\"1\" opacity=\"0.4\"><\u002Fline>\n        <line x1=\"9\" y1=\"11\" x2=\"9\" y2=\"13\" stroke=\"white\" stroke-width=\"1\" opacity=\"0.4\"><\u002Fline>\n        <line x1=\"5\" y1=\"9\" x2=\"7\" y2=\"9\" stroke=\"white\" stroke-width=\"1\" opacity=\"0.4\"><\u002Fline>\n        <line x1=\"11\" y1=\"9\" x2=\"13\" y2=\"9\" stroke=\"white\" stroke-width=\"1\" opacity=\"0.4\"><\u002Fline>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    Collective Knowledge Commons\n  <\u002Fa>\n  <div class=\"nav-links\">\n    <a href=\"#problem\">The Problem<\u002Fa>\n    <a href=\"#solution\">The Solution<\u002Fa>\n    <a href=\"#demo\">See It Work<\u002Fa>\n    <a href=\"#partnership\">Partnership<\u002Fa>\n    <a href=\"#contact\" class=\"nav-cta\">Get in Touch<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\" id=\"hero\">\n  <div class=\"hero-left fade-in\">\n    <div class=\"hero-eyebrow\" style=\"font-size: 24px; width: 500px;\">A TFAll AI Product Story<\u002Fdiv>\n    <h1>The AI teachers trust,<br>now carrying the <em>knowledge of 65,000<\u002Fem><\u002Fh1>\n    <p class=\"hero-sub\">Sofia teaches in Bogotá. Every morning she asks Gemini for help. The answers are good — but they don't know what a teacher in São Paulo figured out last year about the same lesson. The Collective Knowledge Commons changes that.<\u002Fp>\n    <div class=\"hero-actions\">\n      <a href=\"#demo\" class=\"btn-primary\">See it in action<\u002Fa>\n      <a href=\"#solution\" class=\"btn-secondary\">\n        Learn how it works\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8h10M9 4l4 4-4 4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n    <div class=\"hero-stats\">\n      <div>\n        <div class=\"hero-stat-n\">65<span>K<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-stat-l\">educators worldwide<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"hero-stat-n\">60<span>+<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-stat-l\">countries in network<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"hero-stat-n\">20<span>+<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-stat-l\">years of knowledge<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero-right\">\n    <div class=\"hero-bg-orb\"><\u002Fdiv>\n    <div class=\"story-card fade-in\" style=\"transition-delay: 0.2s\">\n      <div class=\"story-card-header\">\n        <div class=\"story-avatar\">S<\u002Fdiv>\n        <div class=\"story-avatar-info\">\n          <div class=\"story-avatar-name\">Sofia Martínez<\u002Fdiv>\n          <div class=\"story-avatar-role\">First-year fellow · Enseña por Colombia<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"story-tag\">Bogotá<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"story-text\">\"I asked about teaching photosynthesis to large classes. Gemini was helpful — but it had <strong>no idea<\u002Fstrong> that a fellow in Brazil had solved this exact problem last year. That knowledge was just… invisible to me.\"<\u002Fp>\n      <div class=\"story-location\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" fill=\"none\"><path d=\"M6.5 1C4.57 1 3 2.57 3 4.5c0 2.75 3.5 7 3.5 7s3.5-4.25 3.5-7C10 2.57 8.43 1 6.5 1z\" stroke=\"currentColor\" stroke-width=\"1.1\" fill=\"none\"><\u002Fpath><circle cx=\"6.5\" cy=\"4.5\" r=\"1.3\" stroke=\"currentColor\" stroke-width=\"1.1\"><\u002Fcircle><\u002Fsvg>\n        Secondary science · 40 students per class\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM -->\n<section class=\"problem-section\" id=\"problem\">\n  <div class=\"problem-inner\">\n    <div class=\"problem-grid\">\n      <div class=\"fade-in\">\n        <div class=\"section-label\" style=\"font-size: 24px;\">The Problem<\u002Fdiv>\n        <h2 class=\"problem-h2\">The AI you use doesn't know what <em>your network knows<\u002Fem><\u002Fh2>\n        <p class=\"problem-body\">Teach For All has built decades of collective intelligence — lesson plans, facilitation guides, research briefs, community knowledge — across 60 countries. None of it reaches the teachers who need it most. Not in the tools they actually use, not at the moment they need it.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fade-in\" style=\"transition-delay: 0.15s\">\n        <div class=\"problem-gaps\">\n          <div class=\"problem-gap\">\n            <div class=\"problem-gap-icon\">🔒<\u002Fdiv>\n            <div>\n              <div class=\"problem-gap-title\">Knowledge is locked in portals<\u002Fdiv>\n              <div class=\"problem-gap-text\">Learning portals and regional training materials exist, but teachers don't search them mid-lesson. They ask Gemini.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"problem-gap\">\n            <div class=\"problem-gap-icon\">🌍<\u002Fdiv>\n            <div>\n              <div class=\"problem-gap-title\">Cross-context insight is invisible<\u002Fdiv>\n              <div class=\"problem-gap-text\">A breakthrough in Kampala doesn't reach Bogotá. The same problem is solved independently, 60 times over.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"problem-gap\">\n            <div class=\"problem-gap-icon\">⚡<\u002Fdiv>\n            <div>\n              <div class=\"problem-gap-title\">No new platform will fix this<\u002Fdiv>\n              <div class=\"problem-gap-text\">Teachers already use AI. Adding another tool they have to learn and remember to use is not the answer.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOLUTION -->\n<section class=\"solution-section\" id=\"solution\">\n  <div class=\"solution-inner\">\n    <div class=\"section-label\" style=\"justify-content: center; font-size: 24px;\">The Solution<\u002Fdiv>\n    <h2 class=\"solution-h2 fade-in\">Not a new tool.<br>The <em>knowledge layer<\u002Fem> behind the tool they trust.<\u002Fh2>\n    <p class=\"solution-sub fade-in\" style=\"transition-delay:0.1s\">An MCP server sits quietly between Sofia and the AI she already uses. When she asks a question, the Collective Knowledge Commons surfaces relevant resources from the entire global network — attributed, contextual, and ready to use.<\u002Fp>\n\n    <div class=\"solution-flow fade-in\" style=\"transition-delay:0.2s\">\n      <div class=\"flow-node\">\n        <span class=\"flow-icon\">💬<\u002Fspan>\n        <div class=\"flow-title\">Teacher asks<\u002Fdiv>\n        <div class=\"flow-desc\">Sofia opens Gemini as usual. No new account. No new behavior.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arrow\">→<\u002Fdiv>\n      <div class=\"flow-node center\">\n        <span class=\"flow-icon\">✦<\u002Fspan>\n        <div class=\"flow-title\">CKC Knowledge Layer<\u002Fdiv>\n        <div class=\"flow-desc\">MCP server enriches the query with TFAll's collective intelligence in real time.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arrow\">→<\u002Fdiv>\n      <div class=\"flow-node\">\n        <span class=\"flow-icon\">🌐<\u002Fspan>\n        <div class=\"flow-title\">Network responds<\u002Fdiv>\n        <div class=\"flow-desc\">Resources from 65,000 educators surface in the answer, attributed and contextual.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px;\" class=\"fade-in\">\n      <div class=\"flow-node\">\n        <span class=\"flow-icon\">🔌<\u002Fspan>\n        <div class=\"flow-title\">Works with any AI<\u002Fdiv>\n        <div class=\"flow-desc\">Gemini, Gemini, Claude — wherever teachers already are.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-node\">\n        <span class=\"flow-icon\">📚<\u002Fspan>\n        <div class=\"flow-title\">Living knowledge base<\u002Fdiv>\n        <div class=\"flow-desc\">Continuously updated by the global TFAll network and partner organisations.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-node\">\n        <span class=\"flow-icon\">🏷️<\u002Fspan>\n        <div class=\"flow-title\">Attributed at source<\u002Fdiv>\n        <div class=\"flow-desc\">Every insight traces back to its originating fellow, country, and context.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DEMO -->\n<section class=\"demo-section\" id=\"demo\">\n  <div class=\"demo-inner\">\n    <div class=\"section-label\" style=\"justify-content:center; font-size: 24px;\">See It Work<\u002Fdiv>\n    <h2 class=\"demo-h2 fade-in\">Same question. <em>Richer<\u002Fem> answer.<\u002Fh2>\n    <p class=\"demo-sub fade-in\">See how Sofia's experience changes when the Collective Knowledge Commons is active.<\u002Fp>\n\n    <div class=\"demo-toggle fade-in\">\n      <button class=\"demo-tab active\" id=\"tab-split\" onclick=\"setDemo('split')\">Side by side<\u002Fbutton>\n      <button class=\"demo-tab\" id=\"tab-before\" onclick=\"setDemo('before')\">Without CKC<\u002Fbutton>\n      <button class=\"demo-tab\" id=\"tab-after\" onclick=\"setDemo('after')\">With CKC<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"demo-container\" id=\"demo-container\">\n      <!-- WITHOUT CKC -->\n      <div class=\"chat-window\" id=\"chat-without\">\n        <div class=\"chat-header\">\n          <div class=\"chat-header-dot\"><\u002Fdiv>\n          <div class=\"chat-header-label\">Gemini<\u002Fdiv>\n          <div class=\"chat-header-badge without\">No CKC<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"chat-body\">\n          <div class=\"msg msg-user\">\n            <div class=\"msg-bubble\">I'm teaching photosynthesis to a class of 40 secondary students in Bogotá. Most lack lab equipment. What's an engaging discussion activity?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"msg msg-ai\">\n            <div class=\"msg-ai-header\">\n              <div class=\"msg-ai-icon\" style=\"background: #1a73e820; color: #1a73e8\">G<\u002Fdiv>\n              <div class=\"msg-ai-name\">Gemini<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"msg-bubble\" id=\"without-response\">\n              You could try a <strong>\"leaf observation\" activity<\u002Fstrong> — have students collect leaves from outside and observe differences in size, shape, and color. Ask them to hypothesize why plants in different light conditions look different.<br><br>\n              A Socratic discussion about where plants get their food can also work well for large groups with no equipment needed.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WITH CKC -->\n      <div class=\"chat-window\" id=\"chat-with\">\n        <div class=\"chat-header\">\n          <div class=\"chat-header-dot\" style=\"background: oklch(0.65 0.14 72)\"><\u002Fdiv>\n          <div class=\"chat-header-label\">Gemini<\u002Fdiv>\n          <div class=\"chat-header-badge with\">✦ CKC Active<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"chat-body\">\n          <div class=\"msg msg-user\">\n            <div class=\"msg-bubble\">I'm teaching photosynthesis to a class of 40 secondary students in Bogotá. Most lack lab equipment. What's an engaging discussion activity?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"msg msg-ai\">\n            <div class=\"msg-ai-header\">\n              <div class=\"msg-ai-icon\" style=\"background: #1a73e820; color: #1a73e8\">G<\u002Fdiv>\n              <div class=\"msg-ai-name\">Gemini  <span style=\"font-size:10px; color: oklch(0.65 0.14 72); margin-left:4px\">✦ drawing from TFAll network<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"msg-bubble\" id=\"with-response\">\n              A fellow in São Paulo used a <strong>\"sunlight mapping\"<\u002Fstrong> activity with similar class sizes: students trace light patterns on paper across a school day, connecting light movement to energy capture. Requires only paper and sunlight.<br><br>\n              The TFAll Global Institute also published a <em>Low-Resource Science Inquiry Guide<\u002Fem> (2023) with facilitation scripts designed for 30–50 student classes in under-resourced settings.\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"msg msg-ai\" style=\"padding-left: 4px\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px; padding-left: 4px\">\n              <div class=\"source-badge\">\n                <svg width=\"11\" height=\"11\" viewBox=\"0 0 11 11\" fill=\"none\"><circle cx=\"5.5\" cy=\"5.5\" r=\"4.5\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fcircle><path d=\"M5.5 3v3l2 1.2\" stroke=\"currentColor\" stroke-width=\"1\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                São Paulo fellow · Enseña Chile 2023\n              <\u002Fdiv>\n              <div class=\"source-badge\">\n                <svg width=\"11\" height=\"11\" viewBox=\"0 0 11 11\" fill=\"none\"><rect x=\"1.5\" y=\"1.5\" width=\"8\" height=\"8\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Frect><path d=\"M3.5 4h4M3.5 6h2.5\" stroke=\"currentColor\" stroke-width=\"1\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                TFAll Global Institute · Resource Guide\n              <\u002Fdiv>\n              <div class=\"source-badge\">\n                <svg width=\"11\" height=\"11\" viewBox=\"0 0 11 11\" fill=\"none\"><circle cx=\"5.5\" cy=\"5.5\" r=\"4.5\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fcircle><path d=\"M5.5 3v3l2 1.2\" stroke=\"currentColor\" stroke-width=\"1\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                Kampala training · Inquiry Science WS\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- NETWORK -->\n<section class=\"network-section\" id=\"network\">\n  <div class=\"network-inner\">\n    <div class=\"network-grid\">\n      <div class=\"fade-in\">\n        <div class=\"section-label\" style=\"font-size: 24px;\">The Network<\u002Fdiv>\n        <h2 class=\"network-h2\">Knowledge built across <em>every classroom<\u002Fem>, in every context<\u002Fh2>\n        <p class=\"network-body\">For two decades, Teach For All has been building a knowledge base unlike any other — practitioners solving hard problems in real classrooms, across 60 countries. That intelligence exists. The Collective Knowledge Commons makes it accessible.<\u002Fp>\n        <div class=\"network-numbers\">\n          <div class=\"network-num\">\n            <div class=\"network-num-n\">65<span>K<\u002Fspan><\u002Fdiv>\n            <div class=\"network-num-l\">active and alumni fellows worldwide<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"network-num\">\n            <div class=\"network-num-n\">60<span>+<\u002Fspan><\u002Fdiv>\n            <div class=\"network-num-l\">partner organisations &amp; countries<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"network-num\">\n            <div class=\"network-num-n\">20<span>+<\u002Fspan><\u002Fdiv>\n            <div class=\"network-num-l\">years of practitioner knowledge<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"network-num\">\n            <div class=\"network-num-n\">1<span>✦<\u002Fspan><\u002Fdiv>\n            <div class=\"network-num-l\">unified knowledge layer, finally accessible<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fade-in\" style=\"transition-delay:0.2s\">\n        <!-- Globe visualization -->\n        <div class=\"globe-viz\">\n          <svg class=\"globe-svg\" viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\" id=\"globe-svg\">\n            <!-- Outer ring -->\n            <circle cx=\"200\" cy=\"200\" r=\"180\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"0.5\" opacity=\"0.1\"><\u002Fcircle>\n            <circle cx=\"200\" cy=\"200\" r=\"160\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"0.5\" opacity=\"0.08\"><\u002Fcircle>\n            <!-- Globe ellipse lines -->\n            <ellipse cx=\"200\" cy=\"200\" rx=\"160\" ry=\"50\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"0.8\" opacity=\"0.12\"><\u002Fellipse>\n            <ellipse cx=\"200\" cy=\"200\" rx=\"160\" ry=\"100\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"0.8\" opacity=\"0.1\"><\u002Fellipse>\n            <ellipse cx=\"200\" cy=\"200\" rx=\"160\" ry=\"140\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"0.8\" opacity=\"0.08\"><\u002Fellipse>\n            <line x1=\"200\" y1=\"40\" x2=\"200\" y2=\"360\" stroke=\"currentColor\" stroke-width=\"0.8\" opacity=\"0.1\"><\u002Fline>\n            <!-- Central node -->\n            <circle cx=\"200\" cy=\"200\" r=\"18\" fill=\"var(--red)\" opacity=\"0.15\"><\u002Fcircle>\n            <circle cx=\"200\" cy=\"200\" r=\"10\" fill=\"var(--red)\" opacity=\"0.4\"><\u002Fcircle>\n            <circle cx=\"200\" cy=\"200\" r=\"5\" fill=\"var(--red)\"><\u002Fcircle>\n            <!-- Satellite nodes - placed at various lat/lon positions -->\n            <!-- Bogotá -->\n            <circle cx=\"138\" cy=\"215\" r=\"6\" fill=\"var(--gold)\" id=\"n-bogota\"><\u002Fcircle>\n            <text x=\"128\" y=\"236\" font-size=\"9\" fill=\"currentColor\" opacity=\"0.6\" font-family=\"var(--sans)\" text-anchor=\"middle\">Bogotá<\u002Ftext>\n            <!-- São Paulo -->\n            <circle cx=\"160\" cy=\"258\" r=\"5\" fill=\"var(--red)\" opacity=\"0.8\" id=\"n-sao\"><\u002Fcircle>\n            <text x=\"160\" y=\"273\" font-size=\"9\" fill=\"currentColor\" opacity=\"0.5\" font-family=\"var(--sans)\" text-anchor=\"middle\">São Paulo<\u002Ftext>\n            <!-- Nairobi/Kampala -->\n            <circle cx=\"248\" cy=\"222\" r=\"5\" fill=\"var(--red)\" opacity=\"0.7\" id=\"n-nairobi\"><\u002Fcircle>\n            <text x=\"258\" y=\"237\" font-size=\"9\" fill=\"currentColor\" opacity=\"0.5\" font-family=\"var(--sans)\" text-anchor=\"start\">Nairobi<\u002Ftext>\n            <!-- Manila -->\n            <circle cx=\"310\" cy=\"195\" r=\"5\" fill=\"var(--gold)\" opacity=\"0.8\" id=\"n-manila\"><\u002Fcircle>\n            <text x=\"318\" y=\"208\" font-size=\"9\" fill=\"currentColor\" opacity=\"0.5\" font-family=\"var(--sans)\" text-anchor=\"start\">Manila<\u002Ftext>\n            <!-- London -->\n            <circle cx=\"205\" cy=\"125\" r=\"4\" fill=\"var(--red)\" opacity=\"0.6\" id=\"n-london\"><\u002Fcircle>\n            <text x=\"220\" y=\"122\" font-size=\"9\" fill=\"currentColor\" opacity=\"0.5\" font-family=\"var(--sans)\">London<\u002Ftext>\n            <!-- Delhi -->\n            <circle cx=\"272\" cy=\"165\" r=\"5\" fill=\"var(--red)\" opacity=\"0.7\" id=\"n-delhi\"><\u002Fcircle>\n            <text x=\"274\" y=\"155\" font-size=\"9\" fill=\"currentColor\" opacity=\"0.5\" font-family=\"var(--sans)\">Delhi<\u002Ftext>\n            <!-- Singapore -->\n            <circle cx=\"294\" cy=\"230\" r=\"4\" fill=\"var(--gold)\" opacity=\"0.6\" id=\"n-sg\"><\u002Fcircle>\n            <!-- Connection lines (animated) -->\n            <line x1=\"138\" y1=\"215\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.25\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"2s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <line x1=\"160\" y1=\"258\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.2\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"2.5s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <line x1=\"248\" y1=\"222\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.2\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"1.8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <line x1=\"310\" y1=\"195\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.2\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"3s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <line x1=\"205\" y1=\"125\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.2\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"2.2s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <line x1=\"272\" y1=\"165\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.2\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"1.6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <line x1=\"294\" y1=\"230\" x2=\"200\" y2=\"200\" stroke=\"var(--red)\" stroke-width=\"1\" opacity=\"0.2\" stroke-dasharray=\"4 3\">\n              <animate attributeName=\"stroke-dashoffset\" from=\"0\" to=\"-14\" dur=\"2.8s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <!-- Pulse rings on central node -->\n            <circle cx=\"200\" cy=\"200\" r=\"22\" fill=\"none\" stroke=\"var(--red)\" stroke-width=\"1.5\" opacity=\"0\">\n              <animate attributeName=\"r\" from=\"10\" to=\"35\" dur=\"2.5s\" repeatCount=\"indefinite\"><\u002Fanimate>\n              <animate attributeName=\"opacity\" from=\"0.5\" to=\"0\" dur=\"2.5s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PARTNERSHIP -->\n<section class=\"partnership-section\" id=\"partnership\">\n  <div class=\"partnership-inner\">\n    <div class=\"section-label\" style=\"justify-content:center; font-size: 24px;\">The Partnership<\u002Fdiv>\n    <div class=\"partnership-logos fade-in\">\n      <div class=\"partner-logo-block\">\n        <div class=\"partner-logo-name\" style=\"color: rgb(250, 246, 246);\">Teach For All<\u002Fdiv>\n        <div class=\"partner-logo-sub\" style=\"color: rgb(250, 246, 246);\">AI Literacy &amp; Creator Collective<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"partner-x\">×<\u002Fdiv>\n      <div class=\"partner-logo-block\">\n        <div class=\"partner-logo-name\" style=\"color: rgb(250, 246, 246);\">Google DeepMind<\u002Fdiv>\n        <div class=\"partner-logo-sub\" style=\"color: rgb(250, 246, 246);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <h2 class=\"partnership-h2 fade-in\">The infrastructure exists.<br>We need a partner to <em>make it real<\u002Fem>.<\u002Fh2>\n    <p class=\"partnership-body fade-in\">Teach For All has the network, the knowledge, and the trust of 65,000 educators in 60 countries. Google DeepMind has the technical platform and AI infrastructure. Together, we can build the layer that connects them — making the collective intelligence of the world's largest educator network available in every AI conversation, everywhere.<\u002Fp>\n\n    <div class=\"partnership-asks fade-in\">\n      <div class=\"ask-item\">\n        <div class=\"ask-num\">01<\u002Fdiv>\n        <div class=\"ask-title\">MCP Infrastructure<\u002Fdiv>\n        <div class=\"ask-desc\">Build and host the MCP server that bridges TFAll's knowledge base to AI assistants worldwide.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ask-item\">\n        <div class=\"ask-num\">02<\u002Fdiv>\n        <div class=\"ask-title\">Knowledge Indexing<\u002Fdiv>\n        <div class=\"ask-desc\">Apply DeepMind's embedding and retrieval capabilities to structure 20+ years of educator knowledge.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ask-item\">\n        <div class=\"ask-num\">03<\u002Fdiv>\n        <div class=\"ask-title\">Global Pilot<\u002Fdiv>\n        <div class=\"ask-desc\">Launch with 5 partner countries — Colombia, Brazil, Kenya, India, Philippines — in Year 1.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <a href=\"#contact\" class=\"btn-large\" style=\"display:inline-block; text-decoration:none\">Start the conversation<\u002Fa>\n  <\u002Fdiv>\n  <!-- BG decoration -->\n  <div style=\"position:absolute; top:-200px; left:-200px; width:600px; height:600px; border-radius:50%; background: radial-gradient(circle, oklch(from var(--red) l c h / 0.12), transparent 70%); pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:absolute; bottom:-150px; right:-150px; width:500px; height:500px; border-radius:50%; background: radial-gradient(circle, oklch(from var(--gold) l c h / 0.08), transparent 70%); pointer-events:none;\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"cta-section\" id=\"contact\">\n  <div class=\"cta-inner\">\n    <div class=\"section-label\" style=\"justify-content:center\">Get Involved<\u002Fdiv>\n    <h2 class=\"cta-h2 fade-in\">Sofia's question deserves a <em>better answer<\u002Fem>.<\u002Fh2>\n    <p class=\"cta-body fade-in\">The knowledge is there. The technology is ready. The teachers are already asking. Let's build the layer that connects them.<\u002Fp>\n    <div class=\"cta-actions fade-in\">\n      <div style=\"position:relative; display:inline-block;\">\n        <a href=\"mailto:stephen.jull@teachforall.org\" class=\"btn-large\" id=\"cta-email-btn\" onmouseenter=\"document.getElementById('email-reveal').style.opacity='1';document.getElementById('email-reveal').style.transform='translateY(0)'\" onmouseleave=\"document.getElementById('email-reveal').style.opacity='0';document.getElementById('email-reveal').style.transform='translateY(4px)'\">\n          Contact the TFAll AI Team\n        <\u002Fa>\n        <div id=\"email-reveal\" style=\"\n          position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%) translateY(4px);\n          background:var(--fg); color:var(--bg); padding:7px 14px; border-radius:8px;\n          font-size:12px; font-weight:500; white-space:nowrap; opacity:0;\n          transition:opacity 0.2s, transform 0.2s; pointer-events:none;\n          font-family:var(--sans); letter-spacing:0.01em;\n        \">stephen.jull@teachforall.org\n          <div style=\"position:absolute;top:100%;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--fg);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"footer-left\">© 2026 Teach For All · AI Literacy &amp; Creator Collective<\u002Fdiv>\n  <div class=\"footer-right\">\n    <a href=\"#\" style=\"color:inherit; text-decoration:none\">teachforall.org<\u002Fa>\n    <a href=\"#\" style=\"color:inherit; text-decoration:none\">Privacy<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\">\n  <div class=\"tweaks-title\">Tweaks<\u002Fdiv>\n  <div class=\"tweak-group\">\n    <div class=\"tweak-label\">Visual Theme<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-btn active\" onclick=\"setTheme('warm', this)\">Warm Editorial<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setTheme('slate', this)\">Dark Slate<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setTheme('minimal', this)\">Clean Minimal<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-group\">\n    <div class=\"tweak-label\">Hero emphasis<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-btn active\" id=\"tw-numbers\" onclick=\"toggleStat(this)\">Show stats<\u002Fbutton>\n      <button class=\"tweak-btn\" id=\"tw-sofia\" onclick=\"toggleSofia(this)\">Sofia card<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"theme\": \"warm\",\n  \"showStats\": true,\n  \"showSofia\": true\n}/*EDITMODE-END*/;\nlet tweaks = {...TWEAK_DEFAULTS};\n\n// ── THEME ──\nfunction setTheme(t, btn) {\n  document.body.setAttribute('data-theme', t);\n  tweaks.theme = t;\n  document.querySelectorAll('.tweak-btn[onclick*=\"setTheme\"]').forEach(b => b.classList.remove('active'));\n  if(btn) btn.classList.add('active');\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: t}}, '*');\n}\n\n// ── TOGGLE STATS ──\nlet statsVisible = true;\nfunction toggleStat(btn) {\n  statsVisible = !statsVisible;\n  document.querySelector('.hero-stats').style.display = statsVisible ? 'flex' : 'none';\n  btn.classList.toggle('active', statsVisible);\n}\n\n// ── TOGGLE SOFIA ──\nlet sofiaVisible = true;\nfunction toggleSofia(btn) {\n  sofiaVisible = !sofiaVisible;\n  document.querySelector('.story-card').style.opacity = sofiaVisible ? '1' : '0';\n  btn.classList.toggle('active', sofiaVisible);\n}\n\n// ── DEMO TABS ──\nfunction setDemo(mode) {\n  const cWithout = document.getElementById('chat-without');\n  const cWith = document.getElementById('chat-with');\n  document.querySelectorAll('.demo-tab').forEach(t => t.classList.remove('active'));\n  document.getElementById('tab-' + mode).classList.add('active');\n  if (mode === 'split') {\n    cWithout.style.display = 'flex'; cWith.style.display = 'flex';\n    document.getElementById('demo-container').style.gridTemplateColumns = '1fr 1fr';\n  } else if (mode === 'before') {\n    cWithout.style.display = 'flex'; cWith.style.display = 'none';\n    document.getElementById('demo-container').style.gridTemplateColumns = '1fr';\n  } else {\n    cWithout.style.display = 'none'; cWith.style.display = 'flex';\n    document.getElementById('demo-container').style.gridTemplateColumns = '1fr';\n  }\n}\n\n// ── SCROLL FADE INS ──\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.12 });\ndocument.querySelectorAll('.fade-in').forEach(el => observer.observe(el));\n\n// ── TWEAKS PROTOCOL ──\nwindow.addEventListener('message', (e) => {\n  if (e.data?.type === '__activate_edit_mode') {\n    document.getElementById('tweaks-panel').classList.add('visible');\n  } else if (e.data?.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaks-panel').classList.remove('visible');\n  }\n});\nwindow.parent.postMessage({type: '__edit_mode_available'}, '*');\n\n// ── APPLY SAVED TWEAKS ──\n(function() {\n  setTheme(TWEAK_DEFAULTS.theme || 'warm');\n  const activeThemeBtn = document.querySelector(`.tweak-btn[onclick*=\"'${TWEAK_DEFAULTS.theme || 'warm'}'\"]`);\n  if (activeThemeBtn) {\n    document.querySelectorAll('.tweak-btn[onclick*=\"setTheme\"]').forEach(b => b.classList.remove('active'));\n    activeThemeBtn.classList.add('active');\n  }\n})();\n\n// ── SMOOTH SCROLL ──\ndocument.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n  a.addEventListener('click', e => {\n    const target = document.querySelector(a.getAttribute('href'));\n    if (target) {\n      e.preventDefault();\n      const y = target.getBoundingClientRect().top + window.scrollY - 80;\n      window.scrollTo({ top: y, behavior: 'smooth' });\n    }\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
